name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy src/jetson_edge_ai_security
      - name: Test
        run: pytest -q
      - name: Generate demo evidence artifacts
        run: edge-security generate-demo-report --output-dir reports/demo
      - name: Validate evidence artifacts
        run: |
          test -s reports/demo/runtime_metrics.json
          test -s reports/demo/alerts.jsonl
          test -s reports/demo/replay_report.md
